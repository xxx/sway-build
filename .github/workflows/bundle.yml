name: bundle

# Build the portable sway bundle and publish it as the moving "bundle-latest"
# release, so downstream CI (glass's Wayland job) can download a prebuilt bundle
# instead of building sway from source on every run. Re-runs when the build
# inputs change, or on manual dispatch.
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - Dockerfile
      - '*.sh'
      - .github/workflows/bundle.yml

permissions:
  contents: write

jobs:
  bundle:
    name: build + publish sway bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # verify.sh runs the assembled bundle headless on the runner. The bundle
      # resolves the Mesa/GL/EGL/gbm/drm stack from the HOST (by design), so install
      # the GLVND loaders + Mesa software EGL/DRI (not just libgl1-mesa-dri), plus
      # wayland-info so verify.sh actually checks instead of skipping.
      - name: Install verify deps
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libegl1 libgl1 libgles2 libgbm1 libdrm2 libegl-mesa0 libgl1-mesa-dri wayland-utils
      - name: Build + verify bundle (Docker)
        run: ./build.sh
      - name: Package bundle
        run: tar -C out -czf sway-bundle-linux-x86_64.tar.gz .
      - name: Publish bundle-latest release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: bundle-latest
          name: sway bundle (latest)
          body: >-
            Prebuilt portable sway bundle (the out/ tree from build.sh) for glass's
            Wayland backend and CI. Extract into ~/.local/share/glass/sway; the host
            must provide the Mesa/GL/EGL stack (e.g. libegl1 libgles2 libgbm1
            libegl-mesa0 libgl1-mesa-dri). Rebuilt from the tip of master — see the
            run log for the source commit.
          files: sway-bundle-linux-x86_64.tar.gz
          fail_on_unmatched_files: true
